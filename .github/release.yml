changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Bug Fixes
      labels:
        - bug
    - title: Enhancements
      labels:
        - enhancement
    - title: Specification
      labels:
        - specification
    - title: Protobuf
      labels:
        - protobuf
    - title: Build System
      labels:
        - bazel
    - title: Python Bindings
      labels:
        - python
    - title: Rust Bindings
      labels:
        - rust
    - title: Go Bindings
      labels:
        - go
    - title: Dependencies
      labels:
        - dependencies
    - title: CI/Infrastructure
      labels:
        - github_actions
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
