# This file is used by the `reuse` tool for copyright and license
# validation.

# In order for `reuse lint` to pass, all files in the repo must have
# copyright and license annotations.

# The three ways to achieve that are:

# (1) Put comments with those annotations in each individual source file.

# (2) For file x/y/z, add a separate file named x/y/z.license with the copyright and license annotations.

# (3) Create a REUSE.toml file that specifies which files it covers,
# and what their copyright and license annotations are.

# All of the files in the py/p4 directory of this repo are
# autogenerated, by running the command `CI/check_codegen.sh`.  The
# most straightforward approach among the 3 listed above is number
# (3).  The path of "py/**" below is glob syntax for reuse that means
# "all files in the p4 directory, and all subdirectories,
# recursively".

version = 1

[[annotations]]
path = [
    "p4/**"
]
SPDX-FileCopyrightText = "2020 The P4 Language Consortium"
SPDX-License-Identifier = "Apache-2.0"
